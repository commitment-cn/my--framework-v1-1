llm:
  provider: deepseek
  model: deepseek-v4-flash
  temperature: 0.7
  max_tokens: 2048
  timeout: 30

agent:
  max_history_length: 20
  max_tool_steps: 3
  debug: false

rag:
  embedding_provider: bailian
  embedding_model: text-embedding-v4
  vector_store: qdrant
  vector_collection: agent_knowledge
  qdrant_host: localhost
  qdrant_port: 6333
  graph_store: neo4j
  neo4j_uri: bolt://localhost:7687
  neo4j_database: neo4j
